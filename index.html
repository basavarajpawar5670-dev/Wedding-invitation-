<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #fbfaf7;
  font-family: 'Montserrat', sans-serif;
  color: #222;
  text-align: center;
}

/* Fade animation */
.fade {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 1.9s ease forwards;
}
.fade:nth-child(2){animation-delay:0.6s;}
.fade:nth-child(3){animation-delay:0.9s;}
.fade:nth-child(4){animation-delay:1.6s;}

@keyframes fadeUp {
  to { opacity:1; transform: translateY(0);}
}

.container {
  padding: 40px 20px;
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 35px;
  letter-spacing: 4px;
  color: #c5a880;
}

.names {
  font-family: 'Playfair Display', serif;
  font-size: 45px;
  margin: 25px 0;
  line-height: 1.6;
}

.divider {
  width: 50px;
  height: 2px;
  background: #c5a880;
  margin: 20px auto;
}

.details {
  font-size: 30px;
  line-height: 1.7;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 26px;
  border-radius: 30px;
  border: 1px solid #c5a880;
  color: #c5a880;
  text-decoration: none;
  transition: 0.3s;
}
.btn:hover {
  background: #c5a880;
  color: white;
}

img {
  width: 100%;
  border-radius: 14px;
  margin-top: 30px;
}

/* Countdown */
#countdown {
  margin-top: 10px;
  font-size: 30px;
  letter-spacing: 1px;
}

/* Music button */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #c5a880;
  color: white;
  padding: 10px 15px;
  border-radius: 30px;
  border: none;
}
</style>
</head>

<body>

<!-- Music -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="container">

<div class="fade title">WEDDING INVITATION</div>

<div class="fade names">
PRADEEP KUMAR B L <br>
& <br>
SHILPA B M
</div>

<div class="fade divider"></div>

<div class="fade details">
With the blessings of our families,<br>
we invite you to celebrate our union
</div>

<div class="fade details">
DATE : April 26 & 27, 2026<br>
  
  Venue : Sri Jagadguru Renukacharya Convention Hall<br>
Chikkamagaluru
</div>

<div class="fade">
<a class="btn" href="https://maps.app.goo.gl/2R4UYKA5yRY84P6C8?g_st=ac" target="_blank">
View Location
</a>
</div>

<div class="fade">
<img src="im.jpg">
</div>

<div class="fade">
<h3 class="title">COUNTDOWN</h3>
<div id="countdown"></div>
</div>

<div class="fade details">
We look forward to celebrating with you
</div>

</div>

<button class="music-btn" onclick="playMusic()">🎶</button>

<script>
var weddingDate = new Date("April 26, 2026 09:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = weddingDate - now;

  var days = Math.floor(d / (1000*60*60*24));
  var hrs = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  var min = Math.floor((d%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  days + " Days " + hrs + " Hrs " + min + " Min";
}, 1000);

function playMusic(){
  document.getElementById("music").play();
}
</script>

</body>
</html>
