<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Royal Gold Edition</title><script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
    :root {
        --royal-gold: #D4AF37;
        --rose-gold: #B76E79;
    }

    body {
        font-family: 'Montserrat', sans-serif;
        background: #ffffff;
        color: #1a1a1a;
    }

    .font-serif-royal { font-family: 'Cinzel', serif; }
    .font-cursive { font-family: 'Great Vibes', cursive; }

    .text-gold-royal {
        background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    .gold-border-gradient {
        border-image: linear-gradient(to right, #BF953F, #FBF5B7, #AA771C) 1;
    }

    #typewriter::after {
        content: '|';
        animation: blink 0.9s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .btn {
        display: inline-block;
        padding: 10px 18px;
        border-radius: 999px;
        background: linear-gradient(to right, #BF953F, #B38728);
        color: white;
        font-size: 14px;
        margin-top: 10px;
        text-decoration: none;
    }
</style>

</head><body><div class="max-w-2xl mx-auto px-6 py-16 text-center"><!-- Ganesh -->
<div class="mb-8">
    <img src="https://img.icons8.com/ios-filled/50/D4AF37/ganesh.png" class="mx-auto w-12 h-12" alt="Ganesh">
</div>

<h2 class="font-serif-royal text-sm tracking-[0.4em] uppercase mb-4 text-[#B76E79]">Wedding Invitation</h2>
<div class="h-[1px] w-32 bg-gray-200 mx-auto mb-10"></div>

<p class="italic text-gray-500 mb-12 text-lg">Together with our families, we invite you to witness the union of two souls.</p>

<!-- Names -->
<div class="mb-12">
    <h1 class="font-serif-royal text-5xl font-bold text-gold-royal uppercase">PRADEEP KUMAR</h1>
    <div class="my-4 text-4xl text-[#B76E79]">&</div>
    <h1 class="font-serif-royal text-5xl font-bold text-gold-royal uppercase">SHILPA</h1>
</div>

<!-- Image -->
<div class="w-72 h-96 mx-auto mb-16 rounded-t-full border-[10px] border-white shadow-2xl overflow-hidden">
    <img src="im.jpg" class="w-full h-full object-cover" alt="Couple">
</div>

<!-- Date -->
<div class="mb-10">
    <h3 class="font-serif-royal tracking-widest border-y border-gray-100 py-4">
        WHEN: April 26 & 27, 2026
    </h3>
    <p class="text-gray-600">Ceremony begins at 5:00 PM</p>
</div>

<!-- Venue -->
<div class="mb-10">
    <h3 class="font-serif-royal text-sm tracking-widest text-[#B76E79]">
        WHERE: Sri Jagadguru Renukacharya Convention Hall, Chikkamagaluru
    </h3>

    <a class="btn" href="https://www.google.com/maps" target="_blank">Open Map</a>
</div>

<!-- Countdown -->
<div class="bg-gray-50 py-10 px-4 rounded-3xl mb-16 border border-gray-100">
    <h4 class="text-xs tracking-[0.3em] mb-8 text-gray-400">COUNTDOWN</h4>

    <div class="flex justify-center gap-6">
        <div><span id="days" class="text-3xl">00</span><small>Days</small></div>
        <div><span id="hours" class="text-3xl">00</span><small>Hrs</small></div>
        <div><span id="mins" class="text-3xl">00</span><small>Min</small></div>
        <div><span id="secs" class="text-3xl text-[#B76E79]">00</span><small>Sec</small></div>
    </div>
</div>

<!-- Typewriter -->
<div class="mt-20 min-h-[120px]">
    <p id="typewriter" class="font-cursive text-3xl"></p>
</div>

</div><script>
const targetDate = new Date("April 26, 2026 17:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24)).toString().padStart(2,'0');
    document.getElementById('hours').innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60)).toString().padStart(2,'0');
    document.getElementById('mins').innerText = Math.floor((diff%(1000*60*60))/(1000*60)).toString().padStart(2,'0');
    document.getElementById('secs').innerText = Math.floor((diff%(1000*60))/1000).toString().padStart(2,'0');
},1000);

const text = "We cannot wait to celebrate this beautiful milestone with you. Your love and blessings mean everything. See you soon — Groom & Bride.";
let i = 0;
let started = false;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,60);
    }
}

const observer = new IntersectionObserver((entries)=>{
    if(entries[0].isIntersecting && !started){
        started = true;
        typeWriter();
    }
},{threshold:0.5});

observer.observe(document.getElementById('typewriter'));
</script></body>
</html>
