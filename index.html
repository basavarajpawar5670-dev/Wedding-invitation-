<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ffffff, #f8f8f8);
    color: black;
    text-align: center;
}

/* Container */
.container {
    padding: 20px;
}

.ganesh {
    width: 70px;
}

/* Gold text */
.gold {
    background: linear-gradient(45deg, #d4af37, #fff5cc, #d4af37);
    -webkit-background-clip: text;
    color: transparent;
}

.title {
    font-size: 40px;
    font-family: 'Playfair Display', serif;
}

.names {
    font-size: 30px;
    margin: 20px 0;
}

/* Image */
.couple {
    width: 260px;
    border-radius: 15px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 15px rgba(212,175,55,0.5);
}

/* Info */
.info {
    font-size: 18px;
}

/* Countdown */
.countdown {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 30px 0;
}

.box {
    border: 2px solid #d4af37;
    padding: 15px;
    border-radius: 10px;
    min-width: 60px;
}

.box span {
    display: block;
    font-size: 24px;
    font-weight: bold;
}

.label {
    font-size: 14px;
    color: #777;
}

/* Button */
.map-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #d4af37;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* Typing */
.typing {
    width: 85%;
    margin: auto;
    border-right: 2px solid #d4af37;
    white-space: nowrap;
    overflow: hidden;
    font-size: 18px;
}

/* Mobile */
@media(max-width:600px){
    .countdown {
        flex-wrap: wrap;
    }
}
</style>
</head>

<body>

<div class="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Ganesha_icon.png" class="ganesh">

<div class="title gold">Wedding Invitation</div>

<p>We warmly invite you to celebrate our special day</p>

<div class="names gold">
PRADEEP KUMAR B L <br> ❤️ <br> SHILPA B M
</div>

<img src="https://via.placeholder.com/260" class="couple">

<div class="info">
<p><b>Date:</b> April 26, 2026</p>
<p><b>Venue:</b> Sri Jagadguru Renukacharya Convention Hall, Chikkamagaluru</p>

<button class="map-btn" onclick="openMap()">Open Map</button>
</div>

<!-- Countdown -->
<div class="countdown">
    <div class="box"><span id="days">0</span><div class="label">D</div></div>
    <div class="box"><span id="hours">0</span><div class="label">H</div></div>
    <div class="box"><span id="minutes">0</span><div class="label">M</div></div>
    <div class="box"><span id="seconds">0</span><div class="label">S</div></div>
</div>

<!-- Typing Letter -->
<div class="typing" id="letter"></div>

</div>

<script>
// Countdown
const weddingDate = new Date("April 26, 2026 10:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const gap = weddingDate - now;

    const d = Math.floor(gap / (1000*60*60*24));
    const h = Math.floor((gap / (1000*60*60)) % 24);
    const m = Math.floor((gap / (1000*60)) % 60);
    const s = Math.floor((gap / 1000) % 60);

    document.getElementById("days").innerText = d;
    document.getElementById("hours").innerText = h;
    document.getElementById("minutes").innerText = m;
    document.getElementById("seconds").innerText = s;
}, 1000);

// Open Map
function openMap(){
    window.open("https://www.google.com/maps/search/?api=1&query=Chikkamagaluru");
}

// Typing effect
const msg = "With love in our hearts, we invite you to join us as we begin our forever journey. Your presence will make our celebration truly unforgettable.";
let i=0;

function typing(){
    if(i < msg.length){
        document.getElementById("letter").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing,35);
    }
}
typing();
</script>

</body>
    </html>
